<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BarFlow — Gestion de Bar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3d;
    --accent: #f0b429; --accent2: #e85d4a; --green: #2dd4a0; --blue: #60a5fa; --purple: #a78bfa;
    --text: #f0f0f8; --text2: #8888aa; --radius: 12px;
    --font-mono: 'Space Mono', monospace; --font: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; padding-bottom: 90px; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 10px; }
  .logo { font-family: var(--font-mono); font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .logo span { color: var(--accent); }

  /* GLOBAL SEARCH BAR in header */
  .global-search-wrap { flex: 1; position: relative; max-width: 260px; }
  .global-search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px 8px 32px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .global-search-input:focus { border-color: var(--accent); }
  .global-search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }
  .global-search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; z-index: 200; max-height: 320px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .global-search-results.show { display: block; }
  .search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: var(--surface2); }
  .search-result-icon { font-size: 18px; flex-shrink: 0; }
  .search-result-name { font-size: 14px; font-weight: 600; }
  .search-result-meta { font-size: 11px; color: var(--text2); }
  .search-result-stock { font-family: var(--font-mono); font-size: 14px; font-weight: 700; margin-left: auto; flex-shrink: 0; }
  .search-no-results { padding: 20px; text-align: center; color: var(--text2); font-size: 14px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; cursor: pointer; transition: all 0.2s; border: none; background: none; color: var(--text2); font-family: var(--font); font-size: 10px; font-weight: 500; }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 20px; height: 20px; }

  .page { display: none; padding: 16px 20px; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .section-title { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; margin: 24px 0 12px; }
  .section-title:first-child { margin-top: 8px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }

  .product-card { display: flex; align-items: center; gap: 12px; }
  .product-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .product-stock { text-align: right; flex-shrink: 0; }
  .stock-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; line-height: 1; }
  .stock-unit { font-size: 11px; color: var(--text2); }
  .stock-warning { color: var(--accent2) !important; }
  .stock-ok { color: var(--green) !important; }
  .stock-critical { color: var(--accent2) !important; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .wine-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .wine-rouge { background: #c0392b; } .wine-blanc { background: #f1c40f; } .wine-rose { background: #e91e8c; } .wine-bulles { background: #60a5fa; }
  .wine-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; margin-top: 3px; }
  .wine-tag-rouge { background: rgba(192,57,43,0.15); color: #e74c3c; } .wine-tag-blanc { background: rgba(241,196,15,0.15); color: #f1c40f; }
  .wine-tag-rose { background: rgba(233,30,140,0.15); color: #e91e8c; } .wine-tag-bulles { background: rgba(96,165,250,0.15); color: var(--blue); }
  .col-tag { display: inline-flex; align-items: center; gap: 3px; background: rgba(167,139,250,0.15); color: var(--purple); border-radius: 99px; padding: 2px 8px; font-size: 11px; font-weight: 600; margin-top: 3px; margin-left: 4px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 600; transition: all 0.15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; } .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--accent2); color: #fff; } .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-blue { background: var(--blue); color: #000; } .btn-green { background: var(--green); color: #000; }
  .btn-wine { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .btn-purple { background: var(--purple); color: #000; }
  .btn-sm { padding: 8px 14px; font-size: 13px; } .btn-full { width: 100%; } .btn-icon { padding: 10px; }

  .counter { display: flex; align-items: center; background: var(--surface2); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .counter-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; font-size: 20px; color: var(--text); transition: background 0.15s; flex-shrink: 0; }
  .counter-btn:active { background: var(--border); }
  .counter-value { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 16px; font-weight: 700; padding: 0 4px; min-width: 40px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font); font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-select { cursor: pointer; }

  .wine-section { background: rgba(192,57,43,0.06); border: 1px solid rgba(192,57,43,0.2); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .wine-section-title { font-size: 12px; font-weight: 700; color: #e74c3c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 200; animation: fadeOverlay 0.2s; backdrop-filter: blur(4px); }
  @keyframes fadeOverlay { from{opacity:0} to{opacity:1} }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none; width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 17px; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 16px 20px; display: flex; gap: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: border-color 0.2s; }
  .stat-card:active { border-color: var(--accent); }
  .stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text2); }

  /* CAVE VALUE BANNER */
  .value-banner { background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(192,57,43,0.1)); border: 1px solid rgba(167,139,250,0.3); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .value-banner-main { }
  .value-banner-label { font-size: 11px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .value-banner-amount { font-family: var(--font-mono); font-size: 32px; font-weight: 700; color: var(--text); }
  .value-banner-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .value-breakdown { display: flex; flex-direction: column; gap: 4px; text-align: right; }
  .value-breakdown-item { font-size: 12px; color: var(--text2); }
  .value-breakdown-item strong { color: var(--text); font-family: var(--font-mono); }

  /* CONSUMPTION HISTORY */
  .history-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .history-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .history-entry-date { font-weight: 700; font-size: 14px; }
  .history-entry-sub { font-size: 12px; color: var(--text2); }
  .consumption-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .consumption-row:last-child { border-bottom: none; }
  .consumption-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .consumption-delta { font-family: var(--font-mono); font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .delta-negative { color: var(--accent2); }
  .delta-positive { color: var(--green); }

  /* SUPPLIER STATS */
  .supplier-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .supplier-stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .supplier-stat-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .supplier-kpis { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .supplier-kpi { background: var(--surface2); border-radius: 8px; padding: 8px; text-align: center; }
  .supplier-kpi-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .supplier-kpi-label { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .supplier-top-products { }
  .supplier-top-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 4px 0; color: var(--text2); border-bottom: 1px solid var(--border); }
  .supplier-top-item:last-child { border-bottom: none; }
  .email-btn { display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #1a73e8, #0d5dbf); color: #fff; border: none; border-radius: 10px; padding: 12px 16px; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; flex: 1; justify-content: center; }
  .email-btn:active { transform: scale(0.97); }
  .email-btn.disabled { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); cursor: default; }
  .email-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ORDER */
  .order-supplier-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .order-supplier-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .order-supplier-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .order-items-list { padding: 0 16px; }
  .order-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .order-item:last-child { border-bottom: none; }
  .qty-badge { background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 99px; }
  .order-supplier-footer { padding: 12px 16px; border-top: 1px solid var(--border); background: rgba(26,115,232,0.05); }

  .filter-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .status-draft { background: rgba(240,180,41,0.15); color: var(--accent); }
  .status-sent { background: rgba(45,212,160,0.15); color: var(--green); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text2); }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 10px 20px; font-size: 14px; font-weight: 600; z-index: 400; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .fab { position: fixed; bottom: 80px; right: 20px; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; box-shadow: 0 4px 20px rgba(240,180,41,0.4); transition: all 0.2s; z-index: 90; }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 24px; height: 24px; color: #000; }
  .fab.hidden { display: none; }

  .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; display: flex; align-items: flex-start; gap: 8px; }
  .alert-info { background: rgba(45,212,160,0.1); border: 1px solid rgba(45,212,160,0.3); color: var(--green); }
  .alert-warning { background: rgba(240,180,41,0.1); border: 1px solid rgba(240,180,41,0.3); color: var(--accent); }

  .copy-area { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--font-mono); font-size: 12px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto; }

  .inv-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .inv-item:last-child { border-bottom: none; }
  .inv-item-info { flex: 1; min-width: 0; }
  .inv-item-name { font-weight: 600; font-size: 15px; }
  .inv-item-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .inv-item.scanned { background: rgba(240,180,41,0.08); border-radius: 10px; padding: 12px 10px; margin: 0 -10px; }

  /* SUPPLIER CARD */
  .supplier-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .supplier-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .supplier-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #e8a23c); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .supplier-info { flex: 1; min-width: 0; }
  .supplier-name-text { font-weight: 700; font-size: 16px; }
  .supplier-email { font-size: 12px; color: var(--blue); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .supplier-stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .supplier-stat-badge { background: var(--surface2); border-radius: 8px; padding: 6px 10px; font-size: 12px; color: var(--text2); }
  .supplier-stat-badge strong { color: var(--text); font-family: var(--font-mono); }
  .supplier-actions { display: flex; gap: 8px; }

  /* TYPE SWITCHER */
  .type-switcher { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 16px; border: 1px solid var(--border); }
  .type-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: none; color: var(--text2); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .type-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  /* CAVE */
  .cave-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .cave-column { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .cave-col-header { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--purple); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .cave-col-count { font-size: 20px; font-weight: 700; font-family: var(--font-mono); color: var(--text); }
  .cave-col-wines { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.6; }
  .wine-color-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .wine-color-btn { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: var(--text2); }
  .wine-color-btn.active-rouge { background: rgba(192,57,43,0.25); color: #e74c3c; border-color: #e74c3c; }
  .wine-color-btn.active-blanc { background: rgba(241,196,15,0.2); color: #f1c40f; border-color: #f1c40f; }
  .wine-color-btn.active-rose { background: rgba(233,30,140,0.2); color: #e91e8c; border-color: #e91e8c; }
  .wine-color-btn.active-bulles { background: rgba(96,165,250,0.2); color: var(--blue); border-color: var(--blue); }
  .wine-color-btn.active-tous { background: var(--accent); color: #000; border-color: var(--accent); }
  .view-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .view-btn { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .view-btn.active { background: var(--purple); color: #000; border-color: var(--purple); }

  /* PAGE TABS (stats sub-pages) */
  .page-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .page-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .page-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* SCANNER */
  .scanner-overlay { position: fixed; inset: 0; background: #000; z-index: 500; display: flex; flex-direction: column; }
  .scanner-overlay.hidden { display: none; }
  .scanner-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: rgba(0,0,0,0.8); z-index: 10; }
  .scanner-title { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: #fff; }
  .scanner-close { background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
  #scanner-viewport { flex: 1; position: relative; overflow: hidden; }
  #scanner-viewport video { width: 100%; height: 100%; object-fit: cover; }
  #scanner-viewport canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .scanner-reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 260px; height: 120px; z-index: 10; pointer-events: none; }
  .scanner-reticle::before,.scanner-reticle::after { content:''; position:absolute; width:30px; height:30px; border-color:var(--accent); border-style:solid; }
  .scanner-reticle::before { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
  .scanner-reticle::after { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
  .scanner-reticle-tr { position:absolute; top:0; right:0; width:30px; height:30px; border-color:var(--accent); border-style:solid; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
  .scanner-reticle-bl { position:absolute; bottom:0; left:0; width:30px; height:30px; border-color:var(--accent); border-style:solid; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
  .scan-line { position:absolute; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:scanAnim 2s infinite; z-index:11; }
  @keyframes scanAnim { 0%{top:calc(50% - 60px);opacity:1} 80%{opacity:1} 100%{top:calc(50% + 60px);opacity:0} }
  .scanner-status { padding:16px 20px; background:rgba(0,0,0,0.85); text-align:center; }
  .scanner-hint { color:rgba(255,255,255,0.6); font-size:13px; margin-bottom:12px; }
  .scanner-result { background:var(--surface); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:none; }
  .scanner-result.show { display:block; }
  .scanner-result-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .scanner-result-value { font-family:var(--font-mono); font-size:15px; font-weight:700; color:var(--accent); }
  .scanner-result-name { font-size:14px; color:var(--text); margin-top:4px; }
  .scanner-actions { display:flex; gap:10px; }
  .input-with-scan { display:flex; gap:8px; align-items:flex-end; }
  .input-with-scan .form-input { flex:1; }
  .scan-mode-bar { background:var(--surface2); border:1px solid var(--accent); border-radius:12px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
  .scan-mode-bar.hidden { display:none; }
  .scan-mode-indicator { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:blink 1s infinite; flex-shrink:0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .scan-mode-text { flex:1; font-size:13px; font-weight:600; color:var(--accent); }
</style>

// ============================
// NAVIGATION
// ============================
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('fab-btn').classList.toggle('hidden', page === 'orders' || page === 'stats');
  currentPage = page;
  closeGlobalSearch();
  if (page==='products') { renderDashboard(); renderProducts(); }
  if (page==='cave') renderCave();
  if (page==='inventory') { initInventory(); renderInventory(); }
  if (page==='orders') renderOrdersHistory();
  if (page==='stats') renderStats();
}

function handleFab() {
  if (currentPage==='cave') openAddWine();
  else openAddProduct();
}

// ============================
// GLOBAL SEARCH
// ============================
function handleGlobalSearch() {
  const q = document.getElementById('global-search').value.trim().toLowerCase();
  const res = document.getElementById('global-search-results');
  if (!q) { res.classList.remove('show'); return; }

  const matches = db.products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.supplier||'').toLowerCase().includes(q) ||
    (p.category||'').toLowerCase().includes(q) ||
    (p.appellation||'').toLowerCase().includes(q) ||
    (p.barcode||'').includes(q)
  ).slice(0, 8);

  if (!matches.length) {
    res.innerHTML = `<div class="search-no-results">Aucun résultat pour "${q}"</div>`;
    res.classList.add('show'); return;
  }

  const ICONS = { "Alcools":"🥃","Bières":"🍺","Vins":"🍷","Softs":"🥤","Jus":"🧃","Sirops":"🍯","Consommables":"🧊","Autres":"📦" };
  res.innerHTML = matches.map(p => {
    const icon = p.type==='wine' ? '🍷' : (ICONS[p.category]||'📦');
    const stockColor = p.stock===0?'var(--accent2)':p.stock<p.minStock?'var(--accent2)':'var(--green)';
    const meta = p.type==='wine'
      ? `${p.wineColor||''} ${p.vintage||''} · ${p.supplier||''}${p.column?' · Col.'+p.column:''}`
      : `${p.category} · ${p.supplier||''}`;
    return `<div class="search-result-item" onclick="selectGlobalResult('${p.id}')">
      <div class="search-result-icon">${icon}</div>
      <div style="flex:1;min-width:0">
        <div class="search-result-name">${p.name}</div>
        <div class="search-result-meta">${meta}</div>
      </div>
      <div class="search-result-stock" style="color:${stockColor}">${p.stock} <span style="font-size:10px;color:var(--text2)">${p.unit}</span></div>
    </div>`;
  }).join('');
  res.classList.add('show');
}

function showGlobalResults() {
  if (document.getElementById('global-search').value.trim()) handleGlobalSearch();
}

function selectGlobalResult(id) {
  closeGlobalSearch();
  editProduct(id);
}

function closeGlobalSearch() {
  document.getElementById('global-search').value = '';
  document.getElementById('global-search-results').classList.remove('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.global-search-wrap')) closeGlobalSearch();
});

const CATEGORY_ICONS = { "Alcools":"🥃","Bières":"🍺","Vins":"🍷","Softs":"🥤","Jus":"🧃","Sirops":"🍯","Consommables":"🧊","Autres":"📦" };
const CATEGORY_COLORS = { "Alcools":"#f0b429","Bières":"#e8a23c","Vins":"#c87891","Softs":"#60c5e4","Jus":"#f97316","Sirops":"#ec4899","Consommables":"#94a3b8","Autres":"#8b9cf4" };
const WINE_COLORS = { rouge:{label:'🔴 Rouge',cls:'wine-tag-rouge',dot:'wine-rouge'}, blanc:{label:'🟡 Blanc',cls:'wine-tag-blanc',dot:'wine-blanc'}, rose:{label:'🩷 Rosé',cls:'wine-tag-rose',dot:'wine-rose'}, bulles:{label:'🫧 Bulles',cls:'wine-tag-bulles',dot:'wine-bulles'} };

function getSupplierByName(name) { return db.suppliers.find(s=>s.name===name); }

function calcCaveValue() {
  const wines = db.products.filter(p=>p.type==='wine'&&p.price&&p.stock>0);
  const total = wines.reduce((s,w)=>s+(w.price*w.stock),0);
  const byColor = {};
  wines.forEach(w=>{
    if(!byColor[w.wineColor]) byColor[w.wineColor]=0;
    byColor[w.wineColor]+=w.price*w.stock;
  });
  return { total, byColor, bottles: wines.reduce((s,w)=>s+w.stock,0), refs: wines.length };
}

        <div class="value-banner-label">💰 Valeur totale cave</div>

          <div class="value-breakdown-item">${colorLabels[c]||c} <strong>${v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</strong></div>

  // Color filters
  const colorFilters=[{key:'tous',label:'Tous'},{key:'rouge',label:'🔴 Rouge'},{key:'blanc',label:'🟡 Blanc'},{key:'rose',label:'🩷 Rosé'},{key:'bulles',label:'🫧 Bulles'}];

    const byCol={};
    wines.forEach(w=>{const col=w.column||'—';if(!byCol[col])byCol[col]=[];byCol[col].push(w);});
    document.getElementById('cave-list').innerHTML=`<div class="cave-view">${Object.entries(byCol).sort(([a],[b])=>a.localeCompare(b)).map(([col,ws])=>`
      <div class="cave-column">

        <div class="cave-col-count">${ws.reduce((s,w)=>s+w.stock,0)}</div>
        <div style="font-size:10px;color:var(--text2)">bouteilles ${ws.some(w=>w.price)?'· '+ws.reduce((s,w)=>s+(w.price||0)*w.stock,0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):''}

    let html='';

  }

function renderConsumptionStats() {
  const el=document.getElementById('stats-consumption');
  if (db.inventory_history.length < 2) {
    el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📉</div><h3>Pas encore assez de données</h3><p>Fais au moins 2 inventaires pour voir la consommation entre chaque.</p></div>`; return;
  }

  // Compare consecutive inventories
  const sorted=[...db.inventory_history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html='';

  for (let i=0;i<Math.min(sorted.length-1,5);i++) {
    const newer=sorted[i], older=sorted[i+1];
    const newerDate=new Date(newer.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    const olderDate=new Date(older.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});

    const deltas=[];
    newer.snapshot.forEach(ns=>{
      const os=older.snapshot.find(o=>o.id===ns.id);
      if (os) {
        const delta=ns.stock-os.stock;
        if (delta!==0) deltas.push({name:ns.name,delta,unit:ns.unit||'',type:ns.type});
      }
    });

    if (!deltas.length) continue;
    const consumed=deltas.filter(d=>d.delta<0).sort((a,b)=>a.delta-b.delta);
    const restocked=deltas.filter(d=>d.delta>0).sort((a,b)=>b.delta-a.delta);

    html+=`<div class="history-entry">
      <div class="history-entry-header">
        <div>
          <div class="history-entry-date">${olderDate} → ${newerDate}</div>
          <div class="history-entry-sub">${consumed.length} consommé${consumed.length>1?'s':''} · ${restocked.length} réappro</div>
        </div>
      </div>`;

    if (consumed.length) {
      html+=`<div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">📉 Consommés</div>`;
      html+=consumed.map(d=>`<div class="consumption-row">
        <div class="consumption-name">${d.type==='wine'?'🍷':''} ${d.name}</div>
        <div class="consumption-delta delta-negative">${d.delta} ${d.unit}</div>
      </div>`).join('');
    }
    if (restocked.length) {
      html+=`<div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px">📈 Réapprovisionnés</div>`;
      html+=restocked.map(d=>`<div class="consumption-row">
        <div class="consumption-name">${d.type==='wine'?'🍷':''} ${d.name}</div>
        <div class="consumption-delta delta-positive">+${d.delta} ${d.unit}</div>
      </div>`).join('');
    }
    html+=`</div>`;
  }

  // Top consumed overall
  const allDeltas={};
  for (let i=0;i<sorted.length-1;i++) {
    const newer=sorted[i], older=sorted[i+1];
    newer.snapshot.forEach(ns=>{
      const os=older.snapshot.find(o=>o.id===ns.id);
      if (os&&ns.stock<os.stock) {
        if (!allDeltas[ns.id]) allDeltas[ns.id]={name:ns.name,total:0,type:ns.type,unit:ns.unit||''};
        allDeltas[ns.id].total+=os.stock-ns.stock;
      }
    });
  }
  const top=Object.values(allDeltas).sort((a,b)=>b.total-a.total).slice(0,5);
  if (top.length) {
    html=`<div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">🏆 Top consommation globale</div>
      ${top.map((t,i)=>`<div class="consumption-row">
        <div style="font-size:13px;color:var(--text2);width:20px;flex-shrink:0">${i+1}</div>
        <div class="consumption-name">${t.type==='wine'?'🍷':''} ${t.name}</div>
        <div class="consumption-delta delta-negative">-${t.total} ${t.unit}</div>
      </div>`).join('')}
    </div>`+html;
  }

  el.innerHTML=html||`<div class="empty-state"><div class="empty-state-icon">📉</div><h3>Aucun mouvement détecté</h3></div>`;
}

function renderSupplierStats() {
  const el=document.getElementById('stats-suppliers');
  if (!db.suppliers.length) { el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🏢</div><h3>Aucun fournisseur</h3></div>`; return; }

  el.innerHTML=db.suppliers.map(s=>{
    const products=db.products.filter(p=>p.supplier===s.name);
    const toOrder=products.filter(p=>p.stock<p.minStock);
    const totalVal=products.filter(p=>p.price).reduce((sum,p)=>sum+(p.price||0)*p.stock,0);
    const ordersCount=db.orders.filter(o=>o.suppliers&&o.suppliers[s.name]).length;
    const topProducts=products.sort((a,b)=>b.stock-a.stock).slice(0,4);

    return `<div class="supplier-stat-card">
      <div class="supplier-stat-header">
        <div class="supplier-stat-name">🏢 ${s.name}</div>
        ${toOrder.length>0?`<span class="badge status-draft">⚠ ${toOrder.length} à commander</span>`:`<span class="badge status-sent">✓ OK</span>`}
      </div>
      <div class="supplier-kpis">
        <div class="supplier-kpi"><div class="supplier-kpi-value">${products.length}</div><div class="supplier-kpi-label">Produits</div></div>
        <div class="supplier-kpi"><div class="supplier-kpi-value">${ordersCount}</div><div class="supplier-kpi-label">Commandes</div></div>
        <div class="supplier-kpi"><div class="supplier-kpi-value" style="color:var(--purple);font-size:14px">${totalVal>0?totalVal.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):'—'}</div><div class="supplier-kpi-label">Valeur stock</div></div>
      </div>
      ${topProducts.length?`<div class="supplier-top-products">
        ${topProducts.map(p=>`<div class="supplier-top-item">
          <span>${p.type==='wine'?'🍷':(CATEGORY_ICONS[p.category]||'')} ${p.name}</span>
          <span style="font-family:var(--font-mono);color:${p.stock<p.minStock?'var(--accent2)':'var(--text)'}">${p.stock} ${p.unit}</span>
        </div>`).join('')}
      </div>`:''}
      ${s.email?`<div style="margin-top:12px">
        <button class="email-btn" onclick="sendSupplierEmail('${s.name}')" ${toOrder.length===0?'style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)"':''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
          ${toOrder.length>0?`Envoyer commande (${toOrder.length})`:' Stock complet ✓'}
        </button>
      </div>`:`<div style="margin-top:8px;font-size:12px;color:var(--accent2)">⚠ E-mail manquant</div>`}
    </div>`;
  }).join('');
}

}

function resetProductForm() {
  ['edit-product-id','p-name','p-barcode','p-vintage','p-appellation','p-column','p-price','p-stock','p-min','p-order-qty'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('p-category').value='Alcools';
  document.getElementById('p-unit').value='bouteilles';
  document.getElementById('p-wine-color').value='rouge';
}

function populateSupplierSelect(currentVal) {
  const sel=document.getElementById('p-supplier-select');
  sel.innerHTML=`<option value="">— Choisir —</option>`+db.suppliers.map(s=>`<option value="${s.name}" ${s.name===currentVal?'selected':''}>${s.name}</option>`).join('');
  document.getElementById('p-supplier-new').value=db.suppliers.find(s=>s.name===currentVal)?'':(currentVal||'');
}

function handleSupplierSelect(val) { if(val) document.getElementById('p-supplier-new').value=''; }
function getSelectedSupplier() {
  const sel=document.getElementById('p-supplier-select').value;
  const newVal=document.getElementById('p-supplier-new').value.trim();
  return sel||newVal;
}

function editProduct(id) {
  const p=db.products.find(x=>x.id===id); if(!p) return;
  resetProductForm();
  document.getElementById('edit-product-id').value=p.id;
  document.getElementById('modal-title').textContent=p.type==='wine'?'🍷 Modifier le vin':'🍹 Modifier le produit';
  document.getElementById('p-name').value=p.name;
  document.getElementById('p-stock').value=p.stock;
  document.getElementById('p-min').value=p.minStock;
  document.getElementById('p-order-qty').value=p.orderQty||'';
  populateSupplierSelect(p.supplier||'');
  if (p.type==='wine') {
    switchProductType('wine');
    document.getElementById('p-wine-color').value=p.wineColor||'rouge';
    document.getElementById('p-vintage').value=p.vintage||'';
    document.getElementById('p-appellation').value=p.appellation||'';
    document.getElementById('p-column').value=p.column||'';
    document.getElementById('p-price').value=p.price||'';
  } else {
    switchProductType('bar');
    document.getElementById('p-category').value=p.category;
    document.getElementById('p-unit').value=p.unit;
    document.getElementById('p-barcode').value=p.barcode||'';
  }
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('duplicate-btn').style.display='flex';
  openModal('product-modal');
}

function saveProduct() {
  const name=document.getElementById('p-name').value.trim();
  if (!name) { showToast('⚠ Nom requis'); return; }
  const id=document.getElementById('edit-product-id').value;
  const supplierName=getSelectedSupplier();
  if (supplierName&&!db.suppliers.find(s=>s.name===supplierName)) {
    db.suppliers.push({id:uid(),name:supplierName,email:'',phone:'',contact:'',notes:''});
  }
  let product;
  if (currentProductType==='wine') {
    product={id:id||uid(),type:'wine',name,category:'Vins',unit:'bouteilles',supplier:supplierName,
      stock:parseFloat(document.getElementById('p-stock').value)||0,
      minStock:parseFloat(document.getElementById('p-min').value)||0,
      orderQty:parseInt(document.getElementById('p-order-qty').value)||1,
      wineColor:document.getElementById('p-wine-color').value,
      vintage:parseInt(document.getElementById('p-vintage').value)||null,
      appellation:document.getElementById('p-appellation').value.trim(),
      column:document.getElementById('p-column').value.trim(),
      price:parseFloat(document.getElementById('p-price').value)||null};
  } else {
    product={id:id||uid(),type:'bar',name,
      category:document.getElementById('p-category').value,
      unit:document.getElementById('p-unit').value,
      supplier:supplierName,
      barcode:document.getElementById('p-barcode').value.trim(),
      stock:parseFloat(document.getElementById('p-stock').value)||0,
      minStock:parseFloat(document.getElementById('p-min').value)||0,
      orderQty:parseInt(document.getElementById('p-order-qty').value)||1};
  }
  if (id){const idx=db.products.findIndex(p=>p.id===id);if(idx>=0)db.products[idx]=product;}
  else db.products.push(product);
  saveData(db); closeModal('product-modal'); renderDashboard();
  if (currentPage==='products') renderProducts();
  if (currentPage==='cave') renderCave();
  showToast(id?'✓ Modifié':'✓ Ajouté');
}

function deleteProduct() {
  const id=document.getElementById('edit-product-id').value;
  if (!id||!confirm('Supprimer ?')) return;
  db.products=db.products.filter(p=>p.id!==id);
  saveData(db); closeModal('product-modal'); renderDashboard();
  if (currentPage==='products') renderProducts();
  if (currentPage==='cave') renderCave();
  showToast('🗑 Supprimé');
}

function duplicateProduct() {
  const id=document.getElementById('edit-product-id').value;
  const p=db.products.find(x=>x.id===id); if(!p) return;
  const copy={...p, id:uid(), name:'Copie — '+p.name, stock:0};
  db.products.push(copy); saveData(db); closeModal('product-modal');
  renderDashboard();
  if (currentPage==='products') renderProducts();
  if (currentPage==='cave') renderCave();
  showToast('📋 Produit dupliqué');
  // Open the copy for editing
  setTimeout(()=>editProduct(copy.id), 300);
}

// ============================
// INVENTORY
// ============================
let scanModeActive=false;
function initInventory() { invCounts={}; db.products.forEach(p=>{invCounts[p.id]=p.stock;}); }
function setInvFilter(cat){currentInvFilter=cat;renderInventory();}
function getInvCategories(){return['Tous',...[...new Set(db.products.map(p=>p.category))]];}

function renderInventory() {
  renderCatFilters('inv-category-filters',currentInvFilter,'setInvFilter',getInvCategories());
  let products=db.products;
  if (currentInvFilter!=='Tous') products=products.filter(p=>p.category===currentInvFilter);
  if (!products.length){document.getElementById('inventory-list').innerHTML=`<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Aucun produit</h3></div>`;return;}
  document.getElementById('inventory-list').innerHTML=`<div class="card">${products.map(p=>{
    const val=invCounts[p.id]!==undefined?invCounts[p.id]:p.stock;
    const isLow=val<p.minStock;
    const label=p.type==='wine'?`${p.name}${p.vintage?' '+p.vintage:''}${p.column?' · Col.'+p.column:''}`:p.name;
    return `<div class="inv-item" id="inv-row-${p.id}">
      <div class="inv-item-info">
        <div class="inv-item-name">${p.type==='wine'?'🍷':(CATEGORY_ICONS[p.category]||'📦')} ${label}</div>
        <div class="inv-item-meta">${p.supplier||p.category} · min. ${p.minStock}</div>
        ${isLow&&val>0?`<div style="font-size:11px;color:var(--accent2)">⚠ Sous le minimum</div>`:''}
        ${val===0?`<div style="font-size:11px;color:var(--accent2)">⛔ Rupture</div>`:''}
      </div>
      <div class="counter">
        <button class="counter-btn" onclick="changeInv('${p.id}',-1)">−</button>
        <div class="counter-value" id="inv-${p.id}" style="color:${isLow?'var(--accent2)':'var(--green)'}">${val}</div>
        <button class="counter-btn" onclick="changeInv('${p.id}',1)">+</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function changeInv(id,delta) {
  invCounts[id]=Math.max(0,(invCounts[id]||0)+delta);
  const p=db.products.find(x=>x.id===id);
  const el=document.getElementById('inv-'+id);
  if(el){el.textContent=invCounts[id];el.style.color=invCounts[id]<(p?.minStock||0)?'var(--accent2)':'var(--green)';}
}

function saveInventory() {
  db.products.forEach(p=>{if(invCounts[p.id]!==undefined)p.stock=invCounts[p.id];});
  db.inventory_history.unshift({id:uid(),date:new Date().toISOString(),snapshot:db.products.map(p=>({id:p.id,name:p.name,stock:p.stock,unit:p.unit,type:p.type}))});
  saveData(db);
  if(scanModeActive)toggleScanMode();
  showToast('✓ Inventaire sauvegardé'); renderDashboard(); switchPage('products');
}

function toggleScanMode() {
  scanModeActive=!scanModeActive;
  document.getElementById('scan-mode-bar').classList.toggle('hidden',!scanModeActive);
  if(scanModeActive){showToast('📷 Mode scan actif');openScanner('inventory');}else closeScanner();
}
function highlightInvRow(id) {
  document.querySelectorAll('.inv-item').forEach(el=>el.classList.remove('scanned'));
  const row=document.getElementById('inv-row-'+id);
  if(row){row.classList.add('scanned');row.scrollIntoView({behavior:'smooth',block:'center'});}
}

// ============================
// ORDERS
// ============================
function generateOrder() {
  const toOrder=db.products.filter(p=>p.stock<p.minStock);
  if(!toOrder.length){showToast('✅ Tout est au-dessus du minimum !');return;}
  const bySupplier={};
  toOrder.forEach(p=>{
    const s=p.supplier||'Sans fournisseur';if(!bySupplier[s])bySupplier[s]=[];
    const qty=Math.ceil((p.minStock-p.stock)/(p.orderQty||1))*(p.orderQty||1);
    bySupplier[s].push({...p,qtyToOrder:qty});
  });
  currentOrder={id:uid(),date:new Date().toISOString(),suppliers:bySupplier,status:'draft'};
  let html='';
  Object.entries(bySupplier).forEach(([supplier,items])=>{
    const sup=getSupplierByName(supplier);
    const hasEmail=sup?.email;
    html+=`<div class="order-supplier-block">
      <div class="order-supplier-header">
        <div class="order-supplier-name">🏢 ${supplier}</div>
        <span class="badge status-draft">${items.length} produit${items.length>1?'s':''}</span>
      </div>
      <div class="order-items-list">${items.map(item=>{
        const label=item.type==='wine'?`${item.name}${item.vintage?' '+item.vintage:''}`:item.name;
        return `<div class="order-item">
          <div><div style="font-size:14px;font-weight:500">${label}</div><div style="font-size:12px;color:var(--text2)">Stock: ${item.stock} · Min: ${item.minStock}</div></div>
          <div style="display:flex;align-items:center;gap:8px"><span class="qty-badge">+${item.qtyToOrder}</span><span style="font-size:12px;color:var(--text2)">${item.unit}</span></div>
        </div>`;
      }).join('')}</div>
      <div class="order-supplier-footer">
        ${hasEmail?`<button class="email-btn" onclick="sendSupplierEmailFromOrder('${supplier}',currentOrder)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
          Envoyer à ${supplier}
        </button>`:`<button class="email-btn disabled">⚠ E-mail manquant pour ${supplier}</button>`}
      </div>
    </div>`;
  });
  document.getElementById('order-preview').innerHTML=html;
  openModal('order-modal');
}

function sendSupplierEmail(supplierName) {
  const supplier=getSupplierByName(supplierName);
  if(!supplier?.email){showToast('⚠ E-mail manquant');return;}
  const toOrder=db.products.filter(p=>p.supplier===supplierName&&p.stock<p.minStock);
  if(!toOrder.length){showToast('✅ Stock OK pour ce fournisseur');return;}
  const date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const subject=encodeURIComponent(`Commande du ${date} — ${supplierName}`);
  let body=`Bonjour${supplier.contact?' '+supplier.contact.split(' ')[0]:''},\n\nVeuillez trouver ci-dessous notre commande du ${date} :\n\n`;
  toOrder.forEach(p=>{
    const qty=Math.ceil((p.minStock-p.stock)/(p.orderQty||1))*(p.orderQty||1);
    const label=p.type==='wine'?`${p.name}${p.vintage?' '+p.vintage:''}${p.wineColor?' ('+p.wineColor+')':''}`:p.name;
    body+=`• ${label} : ${qty} ${p.unit}\n`;
  });
  body+=`\nMerci de confirmer la réception.\n\nCordialement`;
  window.location.href=`mailto:${supplier.email}?subject=${subject}&body=${encodeURIComponent(body)}`;
  showToast(`✉ E-mail ouvert pour ${supplierName}`);
}

function sendSupplierEmailFromOrder(supplierName,order) {
  const supplier=getSupplierByName(supplierName);
  if(!supplier?.email){showToast('⚠ E-mail manquant');return;}
  const items=order.suppliers[supplierName]||[];
  const date=new Date(order.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  const subject=encodeURIComponent(`Commande du ${date} — ${supplierName}`);
  let body=`Bonjour${supplier.contact?' '+supplier.contact.split(' ')[0]:''},\n\nVeuillez trouver ci-dessous notre commande du ${date} :\n\n`;
  items.forEach(p=>{
    const label=p.type==='wine'?`${p.name}${p.vintage?' '+p.vintage:''}${p.wineColor?' ('+p.wineColor+')':''}`:p.name;
    body+=`• ${label} : ${p.qtyToOrder} ${p.unit}\n`;
  });
  body+=`\nMerci de confirmer la réception.\n\nCordialement`;
  window.location.href=`mailto:${supplier.email}?subject=${subject}&body=${encodeURIComponent(body)}`;
  showToast(`✉ E-mail ouvert pour ${supplierName}`);
}

function confirmOrder() {
  if(!currentOrder)return;
  currentOrder.status='sent';
  db.orders.unshift(currentOrder);
  saveData(db); closeModal('order-modal'); renderOrdersHistory(); showToast('✓ Commande sauvegardée');
}

function renderOrdersHistory() {
  if(!db.orders.length){document.getElementById('orders-list').innerHTML=`<div class="empty-state"><div class="empty-state-icon">🧾</div><h3>Aucune commande</h3></div>`;return;}
  document.getElementById('orders-list').innerHTML=db.orders.map(order=>{
    const date=new Date(order.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
    const totalItems=Object.values(order.suppliers).flat().length;
    return `<div class="card" onclick="viewOrder('${order.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-weight:700;font-size:15px;margin-bottom:3px">${date}</div><div style="font-size:13px;color:var(--text2)">${totalItems} produit${totalItems>1?'s':''} · ${Object.keys(order.suppliers).join(', ')}</div></div>
        <span class="badge ${order.status==='sent'?'status-sent':'status-draft'}">${order.status==='sent'?'✓ Envoyé':'Brouillon'}</span>
      </div>
    </div>`;
  }).join('');
}

function viewOrder(id) {
  const order=db.orders.find(o=>o.id===id); if(!order) return;
  const date=new Date(order.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('order-detail-title').textContent=`Commande du ${date}`;
  let html='';
  Object.entries(order.suppliers).forEach(([supplier,items])=>{
    const sup=getSupplierByName(supplier);
    html+=`<div class="order-supplier-block" style="margin-bottom:12px">
      <div class="order-supplier-header"><div class="order-supplier-name">🏢 ${supplier}</div></div>
      <div class="order-items-list">${items.map(item=>`<div class="order-item">
        <div><div style="font-size:14px;font-weight:500">${item.name}</div><div style="font-size:12px;color:var(--text2)">${item.unit}</div></div>
        <span class="qty-badge">+${item.qtyToOrder}</span>
      </div>`).join('')}</div>
      ${sup?.email?`<div class="order-supplier-footer">
        <button class="email-btn" onclick="sendSupplierEmailFromOrder('${supplier}',db.orders.find(o=>o.id==='${order.id}'))">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
          Renvoyer à ${supplier}
        </button>
      </div>`:''}
    </div>`;
  });
  document.getElementById('order-detail-body').innerHTML=html;
  openModal('order-detail-modal');
}

// ============================
// SCANNER
// ============================
let scannerMode='quick',scannerRunning=false,lastScannedCode='',scanCooldown=false;
function openScanner(mode){scannerMode=mode;lastScannedCode='';document.getElementById('scanner-overlay').classList.remove('hidden');document.getElementById('scanner-result').classList.remove('show');document.getElementById('scanner-hint').textContent='Pointez la caméra vers le code-barre';document.getElementById('scanner-actions').innerHTML='';startQuagga();}
function closeScanner(){stopQuagga();document.getElementById('scanner-overlay').classList.add('hidden');if(scannerMode==='inventory'){scanModeActive=false;document.getElementById('scan-mode-bar').classList.add('hidden');}}
function startQuagga(){if(scannerRunning)return;Quagga.init({inputStream:{name:"Live",type:"LiveStream",target:document.getElementById("scanner-viewport"),constraints:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}},locator:{patchSize:"medium",halfSample:true},numOfWorkers:navigator.hardwareConcurrency||2,frequency:10,decoder:{readers:["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader","upc_e_reader"]},locate:true},function(err){if(err){showToast('⚠ Erreur caméra');return;}Quagga.start();scannerRunning=true;});Quagga.onDetected(function(result){const code=result.codeResult.code;if(!code||scanCooldown||code===lastScannedCode)return;lastScannedCode=code;scanCooldown=true;setTimeout(()=>{scanCooldown=false;},1500);handleScanResult(code);});}
function stopQuagga(){if(!scannerRunning)return;try{Quagga.stop();}catch(e){}Quagga.offDetected();scannerRunning=false;}
function handleScanResult(code){if(navigator.vibrate)navigator.vibrate(60);const product=db.products.find(p=>p.barcode===code);document.getElementById('scanner-result-code').textContent=code;document.getElementById('scanner-result').classList.add('show');const nameEl=document.getElementById('scanner-result-name');const actionsEl=document.getElementById('scanner-actions');if(product){nameEl.innerHTML=`✅ <strong>${product.name}</strong>`;nameEl.style.color='var(--green)';document.getElementById('scanner-hint').textContent='Produit identifié !';if(scannerMode==='inventory'){actionsEl.innerHTML=`<button class="btn btn-danger btn-sm" style="flex:1" onclick="invScanDecrement('${product.id}')">− Retirer</button><button class="btn btn-primary" style="flex:1" onclick="invScanIncrement('${product.id}')">+ Ajouter</button>`;}else if(scannerMode==='quick'){actionsEl.innerHTML=`<button class="btn btn-ghost" style="flex:1" onclick="closeScanner()">Fermer</button><button class="btn btn-primary" style="flex:1" onclick="closeScanner();editProduct('${product.id}')">Modifier</button>`;}else if(scannerMode==='barcode-field'){document.getElementById('p-barcode').value=code;closeScanner();showToast('✓ Code ajouté');}}else{nameEl.innerHTML=`❓ Produit non enregistré`;nameEl.style.color='var(--text2)';document.getElementById('scanner-hint').textContent='Code non trouvé';if(scannerMode==='barcode-field'){document.getElementById('p-barcode').value=code;closeScanner();showToast('✓ Code ajouté');}else{actionsEl.innerHTML=`<button class="btn btn-ghost" style="flex:1" onclick="lastScannedCode=''">Rescan</button><button class="btn btn-primary" style="flex:1" onclick="closeScanner();openAddProduct()">Créer produit</button>`;}}}
function invScanIncrement(id){changeInv(id,1);highlightInvRow(id);const p=db.products.find(x=>x.id===id);showToast(`+1 ${p?.name||''}`);lastScannedCode='';document.getElementById('scanner-result').classList.remove('show');document.getElementById('scanner-actions').innerHTML='';document.getElementById('scanner-hint').textContent='Scan suivant...';}
function invScanDecrement(id){changeInv(id,-1);highlightInvRow(id);const p=db.products.find(x=>x.id===id);showToast(`-1 ${p?.name||''}`);lastScannedCode='';document.getElementById('scanner-result').classList.remove('show');document.getElementById('scanner-actions').innerHTML='';document.getElementById('scanner-hint').textContent='Scan suivant...';}

// ============================
// MODALS & TOAST
// ============================
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-overlay').forEach(overlay=>{overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.add('hidden');});});
let toastTimeout;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>el.classList.remove('show'),2500);}

// INIT
renderDashboard();
renderProducts();
</script>
